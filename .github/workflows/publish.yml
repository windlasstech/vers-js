name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.1"
        required: true
        type: string

permissions: {}

jobs:
  build-release-artifact:
    name: Build release artifact
    runs-on: ubuntu-24.04
    environment: npm
    outputs:
      release-tag: ${{ steps.release.outputs.tag }}
      package-name: ${{ steps.npm-package.outputs.name }}
      package-version: ${{ steps.npm-package.outputs.version }}
      package-exists: ${{ steps.npm-package.outputs.exists }}
      package-version-exists: ${{ steps.npm-package.outputs.version_exists }}
      bootstrap-with-token: ${{ steps.first-publish.outputs.bootstrap-with-token }}
      tarball-name: ${{ steps.pack.outputs.tarball-name }}
      tarball-sha256: ${{ steps.pack.outputs.tarball-sha256 }}
      tarball-subjects: ${{ steps.pack.outputs.tarball-subjects }}
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          persist-credentials: false

      - name: Resolve release tag
        id: release
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          package-manager-cache: false

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "^2"

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Verify release tag and changelog
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const tagName = process.env.RELEASE_TAG;

          if (!tagName || !/^v\d+\.\d+\.\d+$/.test(tagName)) {
            throw new Error(`release tag must match vX.Y.Z, got ${JSON.stringify(tagName)}`);
          }

          const packageJson = JSON.parse(readFileSync("package.json", "utf8"));
          const expectedTagName = `v${packageJson.version}`;

          if (tagName !== expectedTagName) {
            throw new Error(`release tag ${tagName} does not match package.json version ${packageJson.version}`);
          }

          const changelog = readFileSync("CHANGELOG.md", "utf8");
          const escapedVersion = packageJson.version.replace(/[.*+?^${}()|[\]\\]/g, String.raw`\$&`);
          const headingPattern = new RegExp(`^## \\[${escapedVersion}\\] - 12\\d{3}-\\d{2}-\\d{2}\\s*$`, "m");

          if (!headingPattern.test(changelog)) {
            throw new Error(`CHANGELOG.md must contain a Human Era section for ${packageJson.version}`);
          }
          NODE

      - name: Check npm package publication state
        id: npm-package
        run: |
          PACKAGE_NAME="$(node -p 'JSON.parse(require("fs").readFileSync("package.json", "utf8")).name')"
          PACKAGE_VERSION="$(node -p 'JSON.parse(require("fs").readFileSync("package.json", "utf8")).version')"

          echo "name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

          if pnpm view "${PACKAGE_NAME}" name --registry "https://registry.npmjs.org" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

          if pnpm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry "https://registry.npmjs.org" >/dev/null 2>&1; then
            echo "version_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report first-publish bootstrap fallback
        id: first-publish
        if: ${{ steps.npm-package.outputs.exists == 'false' }}
        env:
          HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          echo "bootstrap-with-token=${HAS_NPM_TOKEN}" >> "$GITHUB_OUTPUT"

          if [ "${HAS_NPM_TOKEN}" = "true" ]; then
            cat <<'EOF'
          The npm package does not exist yet, but an NPM_TOKEN secret is present.
          This workflow will publish the first version using the token and upload SLSA provenance.
          After this release, configure npm Trusted Publishing and remove the NPM_TOKEN secret.
          EOF
          else
            cat <<'EOF'
          The npm package does not exist yet, so this workflow will skip npm Trusted Publishing.
          Publish the first version manually from a maintainer-controlled environment, then configure npm Trusted Publishing for future releases.

          Recommended bootstrap command after local release validation:
            pnpm publish --access public

          If a token-based CI bootstrap is explicitly chosen instead, use a temporary granular npm token, publish with provenance, and revoke the token immediately:
            pnpm publish --provenance --access public

          The GitHub Release, release tarball, checksum, and SLSA provenance will still be created for this signed tag.
          EOF
          fi

      - name: Block already-published version
        if: ${{ steps.npm-package.outputs.version_exists == 'true' }}
        run: |
          echo "${{ steps.npm-package.outputs.name }}@${{ steps.npm-package.outputs.version }} is already published on npm."
          echo "Stopping before release creation to avoid publishing release artifacts for an already-published version."
          exit 1

      - name: Install dependencies
        run: pnpm ci

      - name: Check formatting
        run: pnpm run fmt:check

      - name: Run Oxlint
        run: pnpm run lint:ts:github

      - name: Run Markdownlint
        run: pnpm run lint:md

      - name: Type-check package
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test

      - name: Run coverage
        run: pnpm run test:coverage

      - name: Build package
        run: pnpm run build

      - name: Verify package artifacts
        run: pnpm run verify:package

      - name: Verify runtime smoke tests
        run: pnpm run verify:runtime

      - name: Pack release tarball
        id: pack
        run: |
          set -euo pipefail

          PACK_JSON="$(pnpm pack --json)"
          TARBALL_NAME="$(node --input-type=module -e 'const pack = JSON.parse(process.argv[1]); console.log(pack.filename);' "$PACK_JSON")"
          TARBALL_SHA256="$(sha256sum "$TARBALL_NAME" | cut -d ' ' -f 1)"
          PACKAGE_PURL="$(node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const packageJson = JSON.parse(readFileSync("package.json", "utf8"));
          const encodedName = encodeURIComponent(packageJson.name).replaceAll("%2F", "/");

          console.log(`pkg:npm/${encodedName}@${packageJson.version}`);
          NODE
          )"

          sha256sum "$TARBALL_NAME" > "${TARBALL_NAME}.sha256"

          echo "tarball-name=${TARBALL_NAME}" >> "$GITHUB_OUTPUT"
          echo "tarball-sha256=${TARBALL_SHA256}" >> "$GITHUB_OUTPUT"
          echo "tarball-subjects=$(printf '%s  %s\n' "$TARBALL_SHA256" "$PACKAGE_PURL" | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload release tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-release-artifacts
          path: |
            ${{ steps.pack.outputs.tarball-name }}
            ${{ steps.pack.outputs.tarball-name }}.sha256
          if-no-files-found: error
          retention-days: 7

  generate-slsa-provenance:
    name: Generate SLSA provenance
    needs: build-release-artifact
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build-release-artifact.outputs.tarball-subjects }}
      draft-release: true
      provenance-name: ${{ needs.build-release-artifact.outputs.tarball-name }}.intoto.jsonl
      upload-assets: true
      upload-tag-name: ${{ needs.build-release-artifact.outputs.release-tag }}

  publish-npm:
    name: Publish to npm
    if: ${{ needs.build-release-artifact.outputs.package-version-exists == 'false' && (needs.build-release-artifact.outputs.package-exists == 'true' || needs.build-release-artifact.outputs.bootstrap-with-token == 'true') }}
    needs:
      - build-release-artifact
      - generate-slsa-provenance
    runs-on: ubuntu-24.04
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Show publish tool versions
        run: |
          node --version
          npm --version

      - name: Download npm release tarball artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-release-artifacts

      - name: Verify npm release tarball checksum
        env:
          EXPECTED_SHA256: ${{ needs.build-release-artifact.outputs.tarball-sha256 }}
          TARBALL_NAME: ${{ needs.build-release-artifact.outputs.tarball-name }}
        run: |
          ACTUAL_SHA256="$(sha256sum "$TARBALL_NAME" | cut -d ' ' -f 1)"

          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "Tarball checksum mismatch for $TARBALL_NAME" >&2
            echo "expected: $EXPECTED_SHA256" >&2
            echo "actual:   $ACTUAL_SHA256" >&2
            exit 1
          fi

      - name: Download SLSA provenance from draft release
        env:
          GH_TOKEN: ${{ github.token }}
          PROVENANCE_NAME: ${{ needs.build-release-artifact.outputs.tarball-name }}.intoto.jsonl
          RELEASE_TAG: ${{ needs.build-release-artifact.outputs.release-tag }}
        run: |
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$PROVENANCE_NAME" \
            --dir "$RUNNER_TEMP"

      - name: Prepare npm publish inputs
        env:
          TARBALL_NAME: ${{ needs.build-release-artifact.outputs.tarball-name }}
        run: cp "$TARBALL_NAME" "$RUNNER_TEMP/$TARBALL_NAME"

      - name: Publish to npm
        working-directory: ${{ runner.temp }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PROVENANCE_NAME: ${{ needs.build-release-artifact.outputs.tarball-name }}.intoto.jsonl
          TARBALL_NAME: ${{ needs.build-release-artifact.outputs.tarball-name }}
        run: npm publish "./$TARBALL_NAME" --access public --provenance-file "./$PROVENANCE_NAME"

  publish-github-release:
    name: Publish GitHub Release
    if: ${{ !cancelled() && needs.build-release-artifact.result == 'success' && needs.generate-slsa-provenance.result == 'success' && (needs.publish-npm.result == 'success' || needs.publish-npm.result == 'skipped') }}
    needs:
      - build-release-artifact
      - generate-slsa-provenance
      - publish-npm
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.build-release-artifact.outputs.release-tag }}
          persist-credentials: false

      - name: Download npm release tarball artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-release-artifacts

      - name: Extract release notes
        env:
          RELEASE_TAG: ${{ needs.build-release-artifact.outputs.release-tag }}
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const tagName = process.env.RELEASE_TAG;
          const version = tagName?.replace(/^v/, "");

          if (!tagName || !version) {
            throw new Error("RELEASE_TAG must contain the release tag");
          }

          const changelog = readFileSync("CHANGELOG.md", "utf8");
          const escapedVersion = version.replace(/[.*+?^${}()|[\]\\]/g, String.raw`\$&`);
          const headingPattern = new RegExp(`^## \\[${escapedVersion}\\] - 12\\d{3}-\\d{2}-\\d{2}\\s*$`, "m");
          const headingMatch = headingPattern.exec(changelog);

          if (!headingMatch) {
            throw new Error(`CHANGELOG.md must contain a Human Era section for ${version}`);
          }

          const sectionStart = headingMatch.index + headingMatch[0].length;
          const remainingChangelog = changelog.slice(sectionStart);
          const nextHeadingIndex = remainingChangelog.search(/^## /m);
          const linkReferenceIndex = remainingChangelog.search(/^\[[^\]]+\]: /m);
          const terminators = [nextHeadingIndex, linkReferenceIndex].filter((index) => index !== -1);
          const sectionEnd = terminators.length === 0 ? remainingChangelog.length : Math.min(...terminators);
          const notes = remainingChangelog.slice(0, sectionEnd).trim();

          if (notes === "") {
            throw new Error(`CHANGELOG.md section for ${version} must not be empty`);
          }

          writeFileSync("release-notes.md", `${notes}\n`, "utf8");
          NODE

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build-release-artifact.outputs.release-tag }}
          TARBALL_NAME: ${{ needs.build-release-artifact.outputs.tarball-name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$TARBALL_NAME" \
            "${TARBALL_NAME}.sha256"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build-release-artifact.outputs.release-tag }}
        run: |
          gh release edit "$RELEASE_TAG" \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --notes-file release-notes.md \
            --draft=false
